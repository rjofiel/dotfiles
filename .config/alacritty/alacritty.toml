general.live_config_reload = true
[terminal.shell]
args = ["--login"]
program = "/usr/bin/zsh"

[selection]
save_to_clipboard = true

[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "0x8C9BA2"
blue = "0xB1A287"
cyan = "0xA3CDE2"
green = "0x50738B"
magenta = "0xD3BBD7"
red = "0x6B5B3F"
white = "0xC8DEE8"
yellow = "0xB96B6F"

[colors.cursor]
cursor = "0x97B0C0"
text = "0x242426"

[colors.normal]
black = "0x4A4A4C"
blue = "0xB1A287"
cyan = "0xA3CDE2"
green = "0x50738B"
magenta = "0xD3BBD7"
red = "0x6B5B3F"
white = "0xC8DEE8"
yellow = "0xB96B6F"

[colors.primary]
background = "0x242426"
foreground = "0xDFEEF5"

[cursor]
style = "Underline"

[env]
TERM = "xterm-256color"

[font]
normal = { family = "agave Nerd Font"}
bold = { family = "agave Nerd Font"}
italic = { family = "agave Nerd Font"}
bold_italic = { family = "agave Nerd Font"}
size = 10.0

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "PasteSelection"
key = "Insert"
mods = "Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Plus"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[mouse]
hide_when_typing = true

[scrolling]
history = 10000
multiplier = 3

[window]
dynamic_title = true
decorations = "full"
decorations_theme_variant = "Dark"
padding = { x = 6, y = 6 }
dynamic_padding = true
# opacity eliminado - picom maneja la transparencia
title = "Alacritty@jofiel"

[window.class]
general = "Alacritty"
instance = "Alacritty"

[window.dimensions]
columns = 100
lines = 30
